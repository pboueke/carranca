# .carranca.yml — carranca project configuration
# See: https://github.com/pboueke/carranca

agents:
  - name: claude
    adapter: claude
    command: claude

  - name: codex
    adapter: codex
    command: codex

# Container runtime settings
runtime:
  network: true
  # Extra docker run flags for the agent container (e.g. --gpus all)
  # extra_flags: --gpus all
  # Extra docker run flags for the logger container
  # logger_extra_flags:

# Persistent volumes for the agent container
volumes:
  cache: true                     # Cache agent memory, config, session across runs
  # extra:                        # Custom volume mounts (host:container[:mode])
  #   - ~/.ssh:/home/carranca/.ssh:ro
  #   - ~/docs:/reference:ro

policy:
  docs_before_code: warn
  tests_before_impl: warn

watched_paths:
  - .env
  - secrets/
  - "*.key"
