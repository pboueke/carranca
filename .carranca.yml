# .carranca.yml — carranca project configuration
# See: https://github.com/pboueke/carranca

agents:
  - name: claude
    adapter: claude
    command: claude

  - name: codex
    adapter: codex
    command: codex

  - name: opencode
    adapter: opencode
    command: opencode

  - name: reviewer
    adapter: stdin
    command: bash /workspace/_review.sh

# Container runtime settings
runtime:
  engine: podman
  network: true
  # Extra docker run flags for the agent container (e.g. --gpus all)
  # extra_flags: --gpus all
  # Extra docker run flags for the logger container
  # logger_extra_flags:

# Persistent volumes for the agent container
volumes:
  cache: true                     # Cache agent memory, config, session across runs
  # extra:                        # Custom volume mounts (host:container[:mode])
  #   - ~/docs:/reference:ro

policy:
  docs_before_code: warn
  tests_before_impl: warn

watched_paths:
  - .env
  - secrets/
  - "*.key"

# Environment variables forwarded into agent containers
environment:
  passthrough:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

# Deep observability — all features enabled for local development
# Each feature degrades gracefully when the host lacks required capabilities
observability:
  resource_interval: 10           # Seconds between cgroup resource samples; 0 disables
  independent_observer: true      # Sidecar container: traces processes and network from outside agent namespaces
  execve_tracing: true            # strace-based process tracing; adds CAP_SYS_PTRACE to logger
  network_logging: true           # /proc/net/tcp polling; requires PID namespace sharing
  network_interval: 5             # Seconds between network polls
  secret_monitoring: true         # fanotify file-read detection on watched_paths; adds CAP_SYS_ADMIN to logger
