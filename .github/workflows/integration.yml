name: Integration Tests

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 3:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # If container-in-container is unsupported on hosted runners, use a
    # self-hosted runner with Docker or Podman installed:
    #   runs-on: [self-hosted, linux, container-capable]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck inotify-tools strace

      - name: Run full test suite
        run: make test-all
        env:
          CARRANCA_CONTAINER_RUNTIME: docker
