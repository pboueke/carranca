agents:
  - name: codex
    adapter: codex
    command: codex

runtime:
  engine: auto
  network: true

volumes:
  cache: true

policy:
  docs_before_code: warn
  tests_before_impl: warn
  max_duration: 2400
  filesystem:
    enforce_watched_paths: true
  resource_limits:
    memory: 2g
    cpus: "2.0"
    pids: 256

watched_paths:
  - .github/
  - docs/
  - SECURITY.md
  - MAINTAINERS.md

observability:
  resource_interval: 15
  execve_tracing: true
  network_logging: true
  network_interval: 10
  secret_monitoring: true
