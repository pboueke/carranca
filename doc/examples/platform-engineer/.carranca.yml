agents:
  - name: codex
    adapter: codex
    command: codex

runtime:
  engine: podman
  network:
    default: deny
    allow:
      - registry.npmjs.org:443
      - pypi.org:443
      - files.pythonhosted.org:443
      - api.github.com:443

volumes:
  cache: true
  extra:
    - ~/.ssh:/home/carranca/.ssh:ro

policy:
  docs_before_code: enforce
  tests_before_impl: enforce
  max_duration: 1800
  resource_limits:
    memory: 2g
    cpus: "2.0"
    pids: 256
  filesystem:
    enforce_watched_paths: true

watched_paths:
  - .env
  - .github/
  - deploy/
  - secrets/

observability:
  resource_interval: 10
  execve_tracing: true
  network_logging: true
  network_interval: 5
  secret_monitoring: true
